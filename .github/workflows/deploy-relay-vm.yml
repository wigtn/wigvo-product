name: Deploy Relay (US VM)

on:
  push:
    branches: [main]
    paths:
      - 'apps/relay-server/**'
      - 'deploy/**'
      - 'uv.lock'
  workflow_dispatch: {}

concurrency:
  group: deploy-relay-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - uses: google-github-actions/setup-gcloud@v2
      - name: Pull & rebuild relay on the VM (IAP SSH)
        run: |
          set -euo pipefail
          deploy() {
            gcloud compute ssh wigvo-relay \
              --project=wigtn-voice-only --zone=us-west1-a --tunnel-through-iap \
              --ssh-flag="-o StrictHostKeyChecking=no" \
              --ssh-flag="-o ConnectTimeout=25" \
              --command='cd /opt/wigvo/wigvo && git fetch origin && git reset --hard origin/main && cd deploy && sudo docker compose -f docker-compose.cloud.yml up -d --build'
          }
          # First attempt also imports the runner's ephemeral SSH key into the
          # service account's OS Login profile; the key can take a few seconds
          # to propagate to the VM, so retry on "Permission denied (publickey)".
          n=0
          until deploy; do
            n=$((n + 1))
            if [ "$n" -ge 5 ]; then
              echo "::error::IAP SSH deploy failed after $n attempts"
              exit 1
            fi
            echo "SSH attempt $n failed — waiting 20s for OS Login key propagation, then retrying..."
            sleep 20
          done
          echo "Deploy command completed."
