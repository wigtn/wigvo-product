name: Deploy Relay (US VM)

on:
  push:
    branches: [main]
    paths:
      - 'apps/relay-server/**'
      - 'deploy/**'
      - 'uv.lock'
  workflow_dispatch: {}

concurrency:
  group: deploy-relay-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - uses: google-github-actions/setup-gcloud@v2
      - name: Write deploy SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_DEPLOY_SSH_KEY }}" > ~/.ssh/wigvo_deploy
          chmod 600 ~/.ssh/wigvo_deploy
          # Reconstruct the public key (also validates the private key parses).
          ssh-keygen -y -f ~/.ssh/wigvo_deploy > ~/.ssh/wigvo_deploy.pub
      - name: Pull & rebuild relay on the VM (IAP SSH)
        run: |
          set -euo pipefail
          # OS Login is disabled on this instance; auth is via the `deploy` user
          # whose public key lives in instance metadata ssh-keys. The matching
          # private key comes from the VM_DEPLOY_SSH_KEY secret. The SA needs only
          # roles/iap.tunnelResourceAccessor + compute.viewer — no metadata writes.
          deploy() {
            gcloud compute ssh deploy@wigvo-relay \
              --project=wigtn-voice-only --zone=us-west1-a --tunnel-through-iap \
              --ssh-key-file="$HOME/.ssh/wigvo_deploy" \
              --ssh-flag="-o StrictHostKeyChecking=no" \
              --ssh-flag="-o ConnectTimeout=25" \
              --command='cd /opt/wigvo/wigvo && git fetch origin && git reset --hard origin/main && cd deploy && sudo docker compose -f docker-compose.cloud.yml up -d --build'
          }
          n=0
          until deploy; do
            n=$((n + 1))
            if [ "$n" -ge 4 ]; then
              echo "::error::IAP SSH deploy failed after $n attempts"
              exit 1
            fi
            echo "SSH attempt $n failed — retrying in 15s..."
            sleep 15
          done
          echo "Deploy command completed."
