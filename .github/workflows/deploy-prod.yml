# ===========================================
# Deploy to Production
# ===========================================
# main 브랜치에 push 시 변경된 파일을 감지해서
# 맥미니 서버에 자동 배포

name: Deploy Prod

on:
  push:
    branches: [main]
    paths-ignore:
      # 문서, 설정 파일 변경은 배포 트리거 제외
      - "**.md"
      - ".gitignore"
      - "docs/**"
      # 서버 배포와 무관한 앱
      - "apps/mobile/**" # 모바일 앱 (서버 배포 무관)

concurrency:
  group: deploy-prod
  # 배포 중 새 push가 와도 현재 배포를 취소하지 않음
  cancel-in-progress: false

jobs:
  # ===========================================
  # 1단계: 변경 감지
  # 어떤 서비스가 변경됐는지 확인해서 해당 서비스만 재배포
  # ===========================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      # 각 서비스/공통 변경 여부를 다음 job들에 전달
      web: ${{ steps.filter.outputs.web }}
      relay: ${{ steps.filter.outputs.relay }}
      compose: ${{ steps.filter.outputs.compose }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'         # Next.js 프론트엔드 (Dockerfile 포함)
              - 'package-lock.json'   # npm 의존성 변경
            relay:
              - 'apps/relay-server/**'  # Python relay 서버 (Dockerfile 포함)
              - 'uv.lock'               # Python 의존성 변경
            compose:
              - 'docker-compose.yml'    # compose 변경 시 두 서비스 모두 영향

  # ===========================================
  # 2단계: 맥미니 배포
  # 변경된 서비스만 선택적으로 재빌드 & 재시작
  # docker-compose.yml 변경 시에는 두 서비스 모두 재배포
  # ===========================================
  deploy:
    name: Deploy to Mac Mini
    needs: changes
    # 세 가지 중 하나라도 변경됐으면 배포 실행
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.relay == 'true' || needs.changes.outputs.compose == 'true'
    runs-on: [self-hosted, prod] # 서버에 설치한 prod runner에서 실행
    environment: production
    timeout-minutes: 30 # web 빌드 + relay 빌드 모두 고려 (relay는 ONNX Runtime 정적 빌드라 오래 걸림)

    steps:
      - name: Sync to latest main
        # git pull 대신 fetch + reset --hard 사용
        # 이유: 서버에서 누군가 직접 수정한 변경사항이 있어도 무시하고 main으로 강제 동기화
        run: |
          cd /opt/server/services/wigvo-v2
          git fetch origin main
          git reset --hard origin/main

      - name: Deploy web
        # web 또는 compose가 변경됐을 때 재빌드
        # NEXT_PUBLIC_* 변수는 빌드타임에 번들에 포함되므로 반드시 재빌드 필요
        # --no-deps: 의존 서비스(relay 등)는 건드리지 않음
        if: needs.changes.outputs.web == 'true' || needs.changes.outputs.compose == 'true'
        run: |
          cd /opt/server/services/wigvo-v2
          docker compose up -d --build --no-deps wigvo-web

      - name: Deploy relay server
        # relay 또는 compose가 변경됐을 때 재빌드
        if: needs.changes.outputs.relay == 'true' || needs.changes.outputs.compose == 'true'
        run: |
          cd /opt/server/services/wigvo-v2
          docker compose up -d --build --no-deps wigvo-relay

      - name: Health check
        # 배포된 서비스만 검증 (변경 안 된 건 스킵)
        # 30초 동안 5초 간격으로 재시도, 실패 시 컨테이너 로그 출력
        run: |
          # web 헬스체크
          if [ "${{ needs.changes.outputs.web }}" == "true" ] || [ "${{ needs.changes.outputs.compose }}" == "true" ]; then
            for i in {1..6}; do
              if curl -fsS http://localhost:10301/ > /dev/null; then
                echo "✅ web healthy"
                break
              fi
              echo "⏳ Waiting for web... ($i/6)"
              sleep 5
              if [ $i -eq 6 ]; then
                echo "❌ web failed"
                docker logs wigvo-web --tail 50
                exit 1
              fi
            done
          fi

          # relay 헬스체크
          # relay-server는 WebSocket 기반이라 GET /이 200 안 줄 수 있음
          # 그래서 컨테이너 실행 상태로 검증
          if [ "${{ needs.changes.outputs.relay }}" == "true" ] || [ "${{ needs.changes.outputs.compose }}" == "true" ]; then
            sleep 5  # 컨테이너 부팅 대기
            if [ -z "$(docker ps -q -f name=wigvo-relay -f status=running)" ]; then
              echo "❌ relay not running"
              docker logs wigvo-relay --tail 50
              exit 1
            fi
            echo "✅ relay running"
          fi

      - name: Cleanup old images
        # 사용하지 않는 dangling 이미지 정리 (디스크 공간 절약)
        # 항상 실행하되 실패해도 배포에는 영향 없음
        if: always()
        run: docker image prune -f
        continue-on-error: true

      - name: Notify Slack (Success)
        # 배포 성공 시 Slack 알림
        if: success()
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -1 | sed 's/"/\\"/g')
          curl -s -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            -d "{
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \":large_green_circle: *배포 성공* — \`wigvo\`\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"\`${SHORT_SHA}\` ${COMMIT_MSG}\"
                  }
                },
                {
                  \"type\": \"context\",
                  \"elements\": [
                    { \"type\": \"mrkdwn\", \"text\": \"*${{ github.actor }}* · \`main\` · <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|워크플로우 보기>\" }
                  ]
                }
              ]
            }"

      - name: Notify Slack (Failure)
        # 배포 실패 시 Slack 알림
        if: failure()
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -1 | sed 's/"/\\"/g')
          curl -s -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            -d "{
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \":red_circle: *배포 실패* — \`wigvo\`\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"\`${SHORT_SHA}\` ${COMMIT_MSG}\"
                  }
                },
                {
                  \"type\": \"context\",
                  \"elements\": [
                    { \"type\": \"mrkdwn\", \"text\": \"*${{ github.actor }}* · \`main\` · <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|로그 확인>\" }
                  ]
                }
              ]
            }"
